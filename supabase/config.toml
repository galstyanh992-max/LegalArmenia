# -----------------------------------------------------------------------------
# Edge Functions security classification
# -----------------------------------------------------------------------------
# verify_jwt = true  => Supabase validates the Authorization Bearer JWT before
#                      invoking the function. Use for browser-facing endpoints.
# verify_jwt = false => function receives anonymous calls and MUST perform its
#                      own authentication/authorization. Permitted only for:
#                        - public webhooks with signature verification
#                        - internal service-to-service calls using x-internal-key
#                        - legacy/disabled stubs that return 410
# -----------------------------------------------------------------------------

# Telegram notification worker: internal-only, requires x-internal-key
[functions.send-telegram-notification]
verify_jwt = false


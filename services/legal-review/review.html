<!doctype html>
<html lang="hy">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Armenian Legal Gold Review</title>
<style>
body{font:16px system-ui;margin:0;background:#f5f4ef;color:#171714}main{max-width:1100px;margin:auto;padding:24px}.card{background:white;border:1px solid #d8d5ca;border-radius:12px;padding:20px;margin:14px 0}pre{white-space:pre-wrap;max-height:42vh;overflow:auto}.grid{display:grid;grid-template-columns:repeat(2,minmax(220px,1fr));gap:12px}label{display:block}input,select,textarea,button{font:inherit;padding:8px}button{background:#243b2d;color:white;border:0;border-radius:8px;padding:12px 20px}.muted{color:#666}code{word-break:break-all}@media(max-width:700px){.grid{grid-template-columns:1fr}}
</style>
<main><h1>Blind legal review</h1><p class="muted">Model, route, score and rank are intentionally hidden.</p>
<div class="card"><label>Session token <input id="token" type="password" size="40"></label> <button onclick="loadNext()">Load next</button> <span id="progress"></span></div>
<section id="case" hidden><div class="card"><h2>Query</h2><p id="query"></p><div id="scope"></div></div><div class="card"><h2>Candidate</h2><div id="metadata"></div><pre id="text"></pre></div>
<form class="card" onsubmit="submitLabel(event)"><div class="grid">
<label>Legal relevance <select name="legal_relevance"><option value="0">0 irrelevant</option><option value="1">1 contextual</option><option value="2">2 materially relevant</option><option value="3">3 direct answer</option></select></label>
<label>Provision specificity <select name="provision_specificity"><option>0</option><option>1</option><option>2</option><option>3</option></select></label>
<label><input type="checkbox" name="answers_query"> Answers query</label><label><input type="checkbox" name="authority_correct"> Authority correct</label>
<label><input type="checkbox" name="status_correct"> Status correct</label><label><input type="checkbox" name="temporally_valid"> Temporally valid</label>
<label><input type="checkbox" name="citation_document_correct"> Citation document correct</label><label><input type="checkbox" name="citation_provision_correct"> Citation provision correct</label>
<label><input type="checkbox" name="answerable"> Answerable</label><label>Reason codes <input name="reason_codes" placeholder="comma,separated,codes"></label></div><p><button>Submit independent label</button></p></form></section><p id="message"></p></main>
<script>
let current=null;const bools=['answers_query','authority_correct','status_correct','temporally_valid','citation_document_correct','citation_provision_correct','answerable'];
const headers=()=>({'Authorization':'Bearer '+document.querySelector('#token').value,'Content-Type':'application/json'});
async function loadNext(){const r=await fetch('/api/next',{headers:headers()});const x=await r.json();if(!r.ok){message.textContent=x.error;return}progress.textContent=`${x.completed}/${x.total}`;current=x.item;if(!current){case.hidden=true;message.textContent='Batch complete';return}case.hidden=false;query.textContent=current.query;scope.textContent=`Scope: ${current.status_scope}; effective at: ${current.effective_at||'—'}; intent: ${current.intent}`;metadata.textContent=`${current.document_title||'Untitled'} | status=${current.legal_status} | article=${current.article||'—'} part=${current.part||'—'} point=${current.point||'—'} | ${current.citation_anchor||current.canonical_key||''}`;text.textContent=current.candidate_text;message.textContent=''}
async function submitLabel(e){e.preventDefault();const f=new FormData(e.target);const body={review_item_id:current.review_item_id,legal_relevance:Number(f.get('legal_relevance')),provision_specificity:Number(f.get('provision_specificity')),reason_codes:String(f.get('reason_codes')).split(',').map(x=>x.trim()).filter(Boolean)};for(const k of bools)body[k]=f.get(k)==='on';const r=await fetch('/api/submit',{method:'POST',headers:headers(),body:JSON.stringify(body)});const x=await r.json();if(!r.ok){message.textContent=x.error;return}e.target.reset();await loadNext()}
</script>
</html>

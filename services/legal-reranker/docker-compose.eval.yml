services:
  gte-reranker:
    build: .
    environment:
      RERANKER_MODEL_ID: Alibaba-NLP/gte-multilingual-reranker-base
      RERANKER_MODEL_REVISION: 8215cf04918ba6f7b6a62bb44238ce2953d8831c
      RERANKER_CODE_REVISION: 40ced75c3017eb27626c9d4ea981bde21a2662f4
      RERANKER_MODEL_SOURCE: /models/gte
      RERANKER_API_KEY: ${RERANKER_API_KEY:?required}
      RERANKER_DEVICE: cpu
      RERANKER_MAX_CANDIDATES: 100
      RERANKER_BATCH_SIZE: 50
      RERANKER_MAX_LENGTH: 128
    ports: ["127.0.0.1:18081:8080"]
    volumes: ["D:/AI_MODELS/RERANKERS/gte:/models/gte:ro"]
    read_only: true
    tmpfs: ["/tmp"]
  bge-reranker:
    build: .
    environment:
      RERANKER_MODEL_ID: BAAI/bge-reranker-v2-m3
      RERANKER_MODEL_REVISION: 953dc6f6f85a1b2dbfca4c34a2796e7dde08d41e
      RERANKER_MODEL_SOURCE: /models/bge
      RERANKER_API_KEY: ${RERANKER_API_KEY:?required}
      RERANKER_DEVICE: cpu
      RERANKER_MAX_CANDIDATES: 100
      RERANKER_BATCH_SIZE: 32
      RERANKER_MAX_LENGTH: 128
    ports: ["127.0.0.1:18082:8080"]
    volumes: ["D:/AI_MODELS/RERANKERS/bge:/models/bge:ro"]
    read_only: true
    tmpfs: ["/tmp"]
